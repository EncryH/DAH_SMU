<!-- 대시보드1: 통합 로그 + 링크 상태 -->
<div class="row-bot">

  <!-- 통합 로그 -->
  <div class="card log-unified-card">
    <div class="log-unified-header">
      <span class="card-title" style="margin-bottom:0">로그</span>
      <div class="log-filter-btns">
        <button class="log-filter-btn active" data-filter="all">ALL</button>
        <button class="log-filter-btn" data-filter="tel">Telemetry</button>
        <button class="log-filter-btn" data-filter="cmd">Command</button>
      </div>
      <div class="log-search-wrap">
        <input id="log-search" class="log-search" type="text" placeholder="검색...">
      </div>
      <span class="log-count" id="log-count">0 rows</span>
    </div>
    <div class="log-scroll">
      <table class="log-tbl">
        <thead>
          <tr>
            <th style="width:68px">시간</th>
            <th style="width:48px">유형</th>
            <th style="width:72px">대상</th>
            <th>내용</th>
            <th style="width:80px">프로토콜</th>
            <th style="width:52px">상태</th>
          </tr>
        </thead>
        <tbody id="d1-log-body"></tbody>
      </table>
    </div>
  </div>

  <!-- 통신 링크 상태 -->
  <div class="card">
    <div class="card-title">통신 링크 상태</div>
    <div class="log-scroll">
      <table class="log-tbl">
        <thead><tr><th>링크</th><th>상태</th><th>프로토콜</th><th>지연</th><th>손실</th></tr></thead>
        <tbody id="d1-link-body">
          <tr><td>UAV ↔ Router</td><td><span class="badge b-ok" id="lnk-uav-st">--</span></td><td>MAVLink/UDP</td><td id="lnk-uav-lat">-- ms</td><td id="lnk-uav-loss">-- %</td></tr>
          <tr><td>UGV ↔ Router</td><td><span class="badge b-ok" id="lnk-ugv-st">--</span></td><td>ROS2/JSON</td><td id="lnk-ugv-lat">-- ms</td><td id="lnk-ugv-loss">-- %</td></tr>
          <tr><td>Router ↔ GCS</td><td><span class="badge b-ok">정상</span></td><td>UDP</td><td>-- ms</td><td>--</td></tr>
          <tr><td>Router ↔ C2</td><td><span class="badge b-ok">정상</span></td><td>UDP</td><td>-- ms</td><td>--</td></tr>
          <tr><td>Router ↔ Collector</td><td><span class="badge b-ok">정상</span></td><td>UDP</td><td>-- ms</td><td>--</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
